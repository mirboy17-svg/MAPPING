<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>종합 노출 분포도 맵핑</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- PapaParse (CSV 파싱) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <!-- html2canvas (JPEG 이미지 저장용 API) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- SheetJS (Excel 데이터 저장용 API) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (for JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 전체 도면 영역 폰트를 맑은 고딕으로 강제 통일 */
    .a4-page-container {
      font-family: "맑은 고딕", "Malgun Gothic", sans-serif !important;
    }

    /* 기본 인쇄 설정 리셋 방지용 추가 스타일 */
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .no-print { display: none !important; }
      .print-area { display: block !important; width: 100% !important; padding: 0 !important; margin: 0 !important; overflow: visible !important; }
    }
    
    /* 도면 요소 부드러운 전환을 위한 클래스 */
    .element-transition {
      transition: box-shadow 0.2s ease;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // --- 유틸리티 및 데이터 처리 함수 ---
    const AGENT_CATEGORIES = [
      '소음', '고열', '분진', '금속가공유', '금속류', '유기화합물', '산 및 알칼리류', '가스 상태 물질류', '허가 대상 유해물질', '기타'
    ];

    const getCategory = (agentName) => {
      if (!agentName || typeof agentName !== 'string') return '기타';
      const name = agentName.toLowerCase().replace(/\s+/g, '');
      if(name.includes('소음') || name.includes('db')) return '소음';
      if(name.includes('고열') || name.includes('wbgt')) return '고열';
      const permit = ['나프틸아민', '디아니시딘', '디클로로벤지딘', '베릴륨', '벤조트리클로라이드', '염화비닐', '콜타르피치', '크롬광', '크롬산아연', '톨리딘', '황화니켈'];
      if(permit.some(k => name.includes(k)) || (name.includes('비소') && !name.includes('삼수소화비소'))) return '허가 대상 유해물질';
      const acidAlkali = ['개미산', '과산화수소', '무수초산', '불화수소', '브롬화수소', '수산화나트륨', '수산화칼륨', '시안화나트륨', '시안화칼륨', '시안화칼슘', '아크릴산', '염화수소', '인산', '질산', '초산', '트리클로로아세트산', '황산'];
      if(acidAlkali.some(k => name.includes(k)) && !name.includes('황산디메틸') && !name.includes('초산에틸') && !name.includes('초산부틸') && !name.includes('초산메틸')) return '산 및 알칼리류';
      const gas = ['불소', '산화에틸렌', '삼수소화비소', '시안화수소', '암모니아', '염소', '오존', '이산화질소', '이산화황', '일산화질소', '일산화탄소', '포스겐', '포스핀', '황화수소'];
      if(gas.some(k => name.includes(k)) || (name.includes('브롬') && !name.includes('브롬화'))) return '가스 상태 물질류';
      const metal = ['구리', '납', '니켈', '망간', '바륨', '백금', '산화마그네슘', '산화아연', '산화철', '셀레늄', '수은', '안티몬', '알루미늄', '오산화바나듐', '인듐', '은', '이산화티타늄', '주석', '지르코늄', '지르코니움', '카드뮴', '코발트', '크롬', '텅스텐'];
      if(metal.some(k => name.includes(k)) || (name.includes('요오드') && !name.includes('요오드화메틸'))) return '금속류';
      const dust = ['분진', '흄', '석면', '유리섬유', '석영', '크리스토발라이트', '트리디마이트', '소우프스톤', '운모', '시멘트', '활석', '흑연', '규산'];
      if(dust.some(k => name.includes(k))) return '분진';
      if(name.includes('금속가공유') || name.includes('가공유') || name.includes('mwf')) return '금속가공유';
      return '유기화합물';
    };

    const findKey = (row, keywords, excludeKeywords = []) => {
      if (!row || typeof row !== 'object') return null;
      const keys = Object.keys(row);
      
      for (let kw of keywords) {
        for (let key of keys) {
          const normalized = String(key).replace(/\s+/g, '');
          if (normalized === kw.replace(/\s+/g, '')) return key;
        }
      }
      
      for (let kw of keywords) {
        const cleanKw = kw.replace(/\s+/g, '');
        for (let key of keys) {
          const normalized = String(key).replace(/\s+/g, '');
          if (normalized.includes(cleanKw)) {
            if (excludeKeywords.length > 0 && excludeKeywords.some(ex => normalized.includes(ex))) {
              continue; 
            }
            return key;
          }
        }
      }
      return null;
    };

    function App() {
      // --- 상태 관리 ---
      const [rawData, setRawData] = useState([]);
      const [analyzedLocations, setAnalyzedLocations] = useState({});
      const [isLoading, setIsLoading] = useState(false);
      const [urls, setUrls] = useState({ 
        noise: '', 
        chem: 'https://docs.google.com/spreadsheets/d/1LzWLbY0wdlspQfZwU8mKCgo37p7p44oUPiOvmX5tWZI/edit?gid=920801530#gid=920801530' 
      });
      
      const [manualTitle, setManualTitle] = useState('( 측정장소 )'); 
      const [orientation, setOrientation] = useState('portrait');
      
      const [showLegend, setShowLegend] = useState(false);

      const [activeCategories, setActiveCategories] = useState(
        AGENT_CATEGORIES.reduce((acc, cat) => ({ ...acc, [cat]: true }), {})
      );

      const [pages, setPages] = useState([{ id: 'page-1', elements: [] }]);
      const [activePageId, setActivePageId] = useState('page-1');
      const [selectedElementId, setSelectedElementId] = useState(null);

      // ★ 작업 내역 저장을 위한 History (Undo/Redo) 상태
      const [past, setPast] = useState([]);
      const [future, setFuture] = useState([]);

      const fileInputRef = useRef(null);

      // --- Undo/Redo 핵심 로직 ---
      const pushHistory = useCallback((currentPages) => {
        setPast(prev => [...prev, currentPages]);
        setFuture([]); // 새로운 액션이 발생하면 미래(Redo) 기록은 삭제
      }, []);

      const undo = useCallback(() => {
        if (past.length === 0) return;
        const previous = past[past.length - 1];
        const newPast = past.slice(0, past.length - 1);
        
        setPast(newPast);
        setFuture([pages, ...future]);
        setPages(previous);
        
        if (!previous.find(p => p.id === activePageId)) {
          setActivePageId(previous[0].id);
          setSelectedElementId(null);
        }
      }, [past, future, pages, activePageId]);

      const redo = useCallback(() => {
        if (future.length === 0) return;
        const next = future[0];
        const newFuture = future.slice(1);
        
        setFuture(newFuture);
        setPast([...past, pages]);
        setPages(next);

        if (!next.find(p => p.id === activePageId)) {
          setActivePageId(next[0].id);
          setSelectedElementId(null);
        }
      }, [past, future, pages, activePageId]);

      // --- 추출된 Row 데이터를 통합 규격으로 파싱하는 공통 함수 ---
      const processParsedRows = (rows, type) => {
        return rows.map(row => {
          const compKey = findKey(row, ['사업장', '사업체', '회사']);
          
          const locKey = findKey(row, ['공정', '공정명', '단위작업장소', '장소', '작업위치', '단위작업', '부서', '위치']);
          const agentKey = findKey(row, ['인자', '유해인자', '측정물질', '물질명', '대상물질', '항목', '소음', '화학']);
          const limitKey = findKey(row, ['기준', '노출기준', '법적기준', '허용기준']);
          const valKey = findKey(row, ['측정치', '결과', '값', 'TWA', '금회', '농도', '평가']);
          const workerKey = findKey(row, ['측정위치', '측정점', '위치도', '기호', '근로자명', '작업자명', '성명', '이름', '근로자', '작업자'], ['수', '인원', '인원수', '명']);

          const compName = compKey && row[compKey] ? String(row[compKey]).trim() : '';
          const agentName = agentKey && row[agentKey] ? String(row[agentKey]).trim() : (type === '소음' ? '소음' : '미상');
          
          const limitStr = limitKey && row[limitKey] ? String(row[limitKey]).trim() : '';
          let limit = parseFloat(limitStr);
          if (isNaN(limit) || limit <= 0) limit = 9999;

          const valStr = valKey && row[valKey] ? String(row[valKey]).trim() : '';
          const cleanValStr = valStr.replace(/\s+/g, '');
          const excludeKeywords = ['횟수조정', '작업없음', '미측정', '측정불가', '가동중지', '미가동', '비가동', '휴업', '결근', '휴가'];
          const isExcluded = excludeKeywords.some(kw => cleanValStr.includes(kw));

          let value = parseFloat(valStr);
          if (valStr.toUpperCase().includes('N.D') || valStr.toUpperCase().includes('ND') || valStr.includes('불검출') || valStr.includes('<')) {
            value = 0;
          } else if (isNaN(value)) {
            value = 0;
          }

          const workerStr = workerKey && row[workerKey] ? String(row[workerKey]).trim() : '';

          return {
            company: compName,
            location: locKey && row[locKey] ? String(row[locKey]).trim() : '미분류 장소',
            agent: agentName,
            category: getCategory(agentName),
            value: value,
            limit: limit,
            hasData: valStr !== '',
            isExcluded: isExcluded,
            workerStr: workerStr
          };
        }).filter(d => d && d.hasData && d.agent !== '미상' && !d.isExcluded);
      };

      // --- 데이터 로드 및 분석 ---
      const fetchAndParse = (urlStr, type) => {
        if (!urlStr || typeof urlStr !== 'string') return Promise.resolve([]);

        return new Promise((resolve, reject) => {
          const matchId = urlStr.match(/\/d\/([a-zA-Z0-9-_]+)/);
          if (!matchId) {
            return reject(new Error(`[${type}] 올바른 구글 시트 주소가 아닙니다.`));
          }

          const sheetId = matchId[1];
          let gid = '0';
          const matchGid = urlStr.match(/[#&?]gid=([0-9]+)/);
          if (matchGid) gid = matchGid[1];

          const callbackName = 'gvizCallback_' + Math.random().toString(36).substring(2, 10);
          const script = document.createElement('script');

          const timeoutId = setTimeout(() => {
            cleanup();
            reject(new Error(`[${type}] 응답 시간 초과. 인터넷 연결이나 시트 공유 상태를 확인하세요.`));
          }, 10000);

          const cleanup = () => {
            clearTimeout(timeoutId);
            delete window[callbackName];
            if (script.parentNode) script.parentNode.removeChild(script);
          };

          window[callbackName] = (jsonData) => {
            cleanup();
            if (jsonData.status === 'error') {
              return reject(new Error(`[${type}] 시트 접근 권한 에러: 공유 설정이 '링크가 있는 모든 사용자'인지 확인해주세요.`));
            }

            try {
              let headers = jsonData.table.cols.map(c => c && c.label ? String(c.label).trim() : '');
              let rows = jsonData.table.rows;

              if (headers.every(h => h === '')) {
                if (rows.length > 0) {
                  headers = rows[0].c.map(cell => (cell && cell.v !== null && cell.v !== undefined) ? String(cell.v).trim() : '');
                  rows = rows.slice(1);
                }
              }

              const parsedRows = rows.map(row => {
                const obj = {};
                headers.forEach((h, i) => {
                  const cell = row.c[i];
                  let val = '';
                  if (cell) {
                    val = cell.v !== null && cell.v !== undefined ? String(cell.v) : '';
                  }
                  obj[h] = val;
                });
                return obj;
              });

              const finalData = processParsedRows(parsedRows, type);
              resolve(finalData);

            } catch (err) {
              reject(new Error(`[${type}] 데이터 파싱 중 오류 발생: ` + err.message));
            }
          };

          script.onerror = () => {
            cleanup();
            reject(new Error(`[${type}] 구글 서버에서 데이터를 로드할 수 없습니다. 시트 링크 및 공유 설정을 확인하세요.`));
          };

          script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json;responseHandler:${callbackName}&gid=${gid}`;
          document.body.appendChild(script);
        });
      };

      const handleAnalyzeData = async () => {
        if (!urls.noise && !urls.chem) return alert('시트 주소를 하나 이상 입력해주세요.');
        setIsLoading(true);
        try {
          const noiseData = urls.noise ? await fetchAndParse(urls.noise, '소음') : [];
          const chemData = urls.chem ? await fetchAndParse(urls.chem, '화학') : [];
          const combined = [...noiseData, ...chemData];
          
          setRawData(combined);

          if (combined.length > 0) {
            const rawComp = combined.find(d => d && d.company)?.company || '';
            const cleanComp = String(rawComp).replace(/_?(소음제외|소음|화학)/g, '').trim();
            setManualTitle(cleanComp ? `( ${cleanComp} )` : '( 측정장소 )'); 
            alert(`${combined.length}건의 데이터를 성공적으로 분석했습니다.`);
          } else {
            alert('데이터는 받아왔으나, 분석 조건에 맞는 유효한 값이 없거나, 시트 열 이름이 올바르지 않습니다.');
          }

        } catch (e) {
          console.error(e);
          alert(e.message || '데이터 분석 중 오류가 발생했습니다.');
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        if (!Array.isArray(rawData) || rawData.length === 0) return;

        const locMap = Object.create(null);

        rawData.forEach(d => {
          if (!d || !d.category || !d.location || !activeCategories[d.category]) return;

          if (!locMap[d.location]) {
            locMap[d.location] = { categories: Object.create(null), workerStrings: [] };
          }
          
          if (d.workerStr && typeof d.workerStr === 'string') {
            locMap[d.location].workerStrings.push(d.workerStr);
          }
          
          if (!locMap[d.location].categories[d.category]) {
            locMap[d.location].categories[d.category] = { maxValue: 0, maxRatio: 0, limit: d.limit || 9999, agents: [] };
          }
          
          const catData = locMap[d.location].categories[d.category];
          let ratio = (d.limit && d.limit !== 9999) ? (d.value / d.limit) * 100 : 0;
          
          if (d.category === '소음' || d.category === '고열') {
            if (d.value >= catData.maxValue) {
              catData.maxValue = d.value;
              catData.limit = d.limit;
              catData.maxRatio = ratio;
            }
          } else {
            if (ratio >= catData.maxRatio) {
              catData.maxRatio = ratio;
              catData.maxValue = d.value;
              catData.limit = d.limit;
            }
          }

          catData.agents.push({ name: String(d.agent), value: d.value, ratio, limit: d.limit });
        });

        Object.keys(locMap).forEach(loc => {
          const strings = locMap[loc].workerStrings;
          if (!Array.isArray(strings)) return;
          
          const uniqueBlocks = new Set();
          
          strings.forEach(s => {
            if (!s || typeof s !== 'string') return;
            let noKorean = s.replace(/[ㄱ-ㅎㅏ-ㅣ가-힣\(\)\[\]\{\}]/g, ' ');
            const parts = noKorean.split(/[\s,]+/);
            parts.forEach(part => {
              let cleanString = part.trim(); 
              if (cleanString !== "") {
                uniqueBlocks.add(cleanString); 
              }
            });
          });

          const sortedBlocks = Array.from(uniqueBlocks).sort((a, b) => {
            const numA = parseInt(a.match(/\d+/) || [0], 10);
            const numB = parseInt(b.match(/\d+/) || [0], 10);
            if (numA !== numB) return numA - numB;
            return a.localeCompare(b);
          });

          locMap[loc].pointSummary = sortedBlocks.join(', ');
        });

        setAnalyzedLocations(locMap);
      }, [rawData, activeCategories]);

      const getExposureStyleAndText = (category, data) => {
        let bg = '#e5e7eb', text = 'text-gray-700', displayText = '';
        const val = typeof data.maxValue === 'number' ? data.maxValue : 0;
        const ratio = typeof data.maxRatio === 'number' ? data.maxRatio : 0;
        const limit = typeof data.limit === 'number' ? data.limit : 9999;

        if (category === '소음') {
          displayText = `${val.toFixed(1)} dB`;
          const threshold = limit !== 9999 ? limit : 90;
          if (val > threshold) { bg = '#ef4444'; text = 'text-white'; }
          else if (val >= 85) { bg = '#f97316'; text = 'text-white'; }
          else if (val >= 80) { bg = '#eab308'; text = 'text-gray-900'; }
          else { bg = '#22c55e'; text = 'text-white'; }
        } else if (category === '고열') {
          displayText = `${val.toFixed(1)} ℃`;
          const threshold = limit !== 9999 ? limit : 30;
          if (val > threshold) { bg = '#ef4444'; text = 'text-white'; }
          else if (val >= 25) { bg = '#f97316'; text = 'text-white'; }
          else if (val >= 23) { bg = '#eab308'; text = 'text-gray-900'; }
          else { bg = '#22c55e'; text = 'text-white'; }
        } else {
          displayText = `${ratio.toFixed(1)} %`;
          if (ratio > 100) { bg = '#ef4444'; text = 'text-white'; }
          else if (ratio >= 50) { bg = '#f97316'; text = 'text-white'; }
          else if (ratio >= 10) { bg = '#eab308'; text = 'text-gray-900'; }
          else { bg = '#22c55e'; text = 'text-white'; }
        }
        return { bg, text, displayText };
      };

      const generateId = () => Math.random().toString(36).substr(2, 9);

      const addElement = (type) => {
        pushHistory(pages); // 추가 전 상태 저장
        
        let w = 150, h = 120, text = '공정명', baseColor = '#ffffff';
        if (type === 'door') { w = 50; h = 10; text = ''; baseColor = '#000000'; }
        else if (type === 'rect') { w = 180; text = '공정명'; }
        else if (type === 'circle') { w = 160; h = 160; text = '공정명(원형)'; } 
        else if (type === 'office') { w = 200; h = 100; text = '사무실'; baseColor = '#f3f4f6'; }
        else if (type === 'text') { w = 120; h = 40; text = '자유 텍스트'; baseColor = 'transparent'; } 
        else if (type === 'text-red') { w = 80; h = 30; text = '*P1'; baseColor = 'transparent'; } 
        else if (type === 'company-name') { w = 200; h = 40; text = '< 0000 >'; baseColor = 'transparent'; } 
        else if (type === 'line-h') { w = 200; h = 1; text = ''; baseColor = '#000000'; } 
        else if (type === 'line-v') { w = 5; h = 200; text = ''; baseColor = '#000000'; } 
        else if (type === 'border-rect') { w = 180; h = 120; text = '투명공정명'; baseColor = 'transparent'; } 

        const newEl = {
          id: generateId(),
          type,
          x: 150,
          y: 150,
          w,
          h,
          text,
          symbolText: '', 
          linkedLocation: '',
          baseColor,
          fontSize: 14,
          row1Ratio: 30, 
          row2Ratio: 20, 
          row3Ratio: 50, 
        };

        setPages(prev => prev.map(p => {
          if (p.id === activePageId) return { ...p, elements: [...p.elements, newEl] };
          return p;
        }));
        setSelectedElementId(newEl.id);
      };

      const addPage = () => {
        pushHistory(pages); // 페이지 추가 전 상태 저장
        const newPageId = `page-${pages.length + 1}`;
        setPages([...pages, { id: newPageId, elements: [] }]);
        setActivePageId(newPageId);
      };

      // ★ 페이지 개별 삭제 기능
      const deletePage = (id) => {
        if (pages.length <= 1) {
          alert('최소 1개의 페이지는 존재해야 합니다.');
          return;
        }
        if (!window.confirm('이 페이지와 내부의 모든 도면을 삭제하시겠습니까?\n(Ctrl+Z로 복구 가능합니다)')) return;
        
        pushHistory(pages);
        const newPages = pages.filter(p => p.id !== id);
        setPages(newPages);
        if (activePageId === id) {
          setActivePageId(newPages[0].id);
          setSelectedElementId(null);
        }
      };

      const updateElementDirectly = (targetId, updates, saveHistoryFlag = true) => {
        if (saveHistoryFlag) pushHistory(pages);
        setPages(prev => prev.map(p => {
          if (p.id === activePageId) {
            return {
              ...p,
              elements: p.elements.map(el => el.id === targetId ? { ...el, ...updates } : el)
            };
          }
          return p;
        }));
      };

      const updateSelectedElement = (updates, saveHistoryFlag = true) => {
        if (selectedElementId) {
          updateElementDirectly(selectedElementId, updates, saveHistoryFlag);
        }
      };

      const deleteSelectedElement = useCallback(() => {
        if (!selectedElementId) return;
        pushHistory(pages); // 삭제 전 상태 저장
        setPages(prev => prev.map(p => {
          if (p.id === activePageId) {
            return { ...p, elements: p.elements.filter(el => el.id !== selectedElementId) };
          }
          return p;
        }));
        setSelectedElementId(null);
      }, [activePageId, selectedElementId, pages, pushHistory]);

      // 단축키 (삭제, 실행취소, 다시실행) 핸들링
      useEffect(() => {
        const handleKeyDown = (e) => {
          const activeTag = document.activeElement?.tagName;
          const inInput = ['INPUT', 'TEXTAREA', 'SELECT'].includes(activeTag);

          // 1. 삭제 (Delete / Backspace)
          if (e.key === 'Delete' || e.key === 'Backspace') {
            if (inInput) return; // 텍스트 입력창 내부에서는 삭제 방지
            if (selectedElementId) {
              e.preventDefault();
              deleteSelectedElement();
            }
          }

          // 2. Undo / Redo 단축키 (Ctrl+Z / Ctrl+Y / Ctrl+Shift+Z)
          if ((e.ctrlKey || e.metaKey) && !inInput) {
            if (e.key.toLowerCase() === 'z') {
              if (e.shiftKey) {
                e.preventDefault();
                redo();
              } else {
                e.preventDefault();
                undo();
              }
            } else if (e.key.toLowerCase() === 'y') {
              e.preventDefault();
              redo();
            }
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [selectedElementId, deleteSelectedElement, undo, redo]);

      const handlePrint = () => window.print();

      const getDynamicFileName = (ext, suffix = '') => {
        const now = new Date();
        const yy = String(now.getFullYear()).slice(2); 
        const half = now.getMonth() < 6 ? '상반기' : '하반기'; 
        const title = manualTitle ? manualTitle : '( 측정장소 )'; 
        
        return `'${yy}${half}' ${title} 도면${suffix}.${ext}`;
      };

      const handleSaveJpeg = async () => {
        const originalPageId = activePageId;
        
        try {
          for (let i = 0; i < pages.length; i++) {
            const page = pages[i];
            setActivePageId(page.id);
            await new Promise(resolve => setTimeout(resolve, 300));
            
            const pageEl = document.getElementById(`page-${page.id}`); 
            if (!pageEl) continue;
            
            const canvas = await window.html2canvas(pageEl, { 
              scale: 2, 
              backgroundColor: '#ffffff', 
              useCORS: true,
              logging: false,
              scrollY: -window.scrollY, 
              scrollX: 0,
              width: pageEl.scrollWidth, 
              height: pageEl.scrollHeight, 
              windowWidth: document.documentElement.scrollWidth,
              windowHeight: document.documentElement.scrollHeight
            });
            
            const link = document.createElement('a');
            const suffix = pages.length > 1 ? `_P${i + 1}` : '';
            link.download = getDynamicFileName('jpg', suffix); 
            link.href = canvas.toDataURL('image/jpeg', 1.0); 
            link.click();
            
            await new Promise(resolve => setTimeout(resolve, 300));
          }
        } catch (err) {
          console.error(err);
          alert('JPEG 이미지 저장 중 오류가 발생했습니다.');
        } finally {
          setActivePageId(originalPageId);
        }
      };

      const handleSaveExcel = () => {
        if (Object.keys(analyzedLocations).length === 0) {
          return alert('저장할 분석 데이터가 없습니다. 데이터를 먼저 연동해주세요.');
        }

        const excelData = [];

        Object.keys(analyzedLocations).forEach(loc => {
          const locData = analyzedLocations[loc];
          const pointSummary = locData.pointSummary || '';

          Object.entries(locData.categories).forEach(([cat, data]) => {
            const styleInfo = getExposureStyleAndText(cat, data);
            let exposureLevel = '';
            
            if (styleInfo.bg === '#ef4444') exposureLevel = '노출기준 초과';
            else if (styleInfo.bg === '#f97316') exposureLevel = '50~100% 이하(소음 85이상, 고열 25℃이상)';
            else if (styleInfo.bg === '#eab308') exposureLevel = '10~50% 미만(소음 80이상, 고열 23℃이상)';
            else if (styleInfo.bg === '#22c55e') exposureLevel = '10% 미만';

            const agentNames = data.agents.map(a => a.name).join(', ');

            excelData.push({
              '단위작업장소 (공정)': loc,
              '측정위치 (기호)': pointSummary,
              '유해인자 분류': cat,
              '상세 포함 물질': agentNames,
              '최대 노출 수치': styleInfo.displayText,
              '노출수준 평가': exposureLevel
            });
          });
        });

        try {
          const worksheet = window.XLSX.utils.json_to_sheet(excelData);
          const workbook = window.XLSX.utils.book_new();
          window.XLSX.utils.book_append_sheet(workbook, worksheet, "분석결과");
          
          const fileName = getDynamicFileName('xlsx'); 
          window.XLSX.writeFile(workbook, fileName);
        } catch (err) {
          console.error(err);
          alert('엑셀 파일 저장 중 오류가 발생했습니다.');
        }
      };

      const handleSaveJSON = () => {
        const dataToSave = {
          version: '1.0',
          pages,
          rawData,
          analyzedLocations,
          manualTitle,
          orientation,
          activeCategories,
          urls,
          showLegend 
        };
        const blob = new Blob([JSON.stringify(dataToSave)], {type: "application/json"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = getDynamicFileName('json'); 
        link.click();
        URL.revokeObjectURL(link.href);
      };

      const handleLoadJSON = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.pages) setPages(data.pages);
            if (data.rawData) setRawData(data.rawData);
            if (data.analyzedLocations) setAnalyzedLocations(data.analyzedLocations);
            if (data.manualTitle !== undefined) setManualTitle(data.manualTitle);
            if (data.orientation) setOrientation(data.orientation);
            if (data.activeCategories) setActiveCategories(data.activeCategories);
            if (data.urls) setUrls(data.urls);
            if (data.showLegend !== undefined) setShowLegend(data.showLegend); 
            
            // 데이터 로드 시 History 초기화
            setPast([]);
            setFuture([]);

            setPages(prevPages => prevPages.map(page => ({
              ...page,
              elements: page.elements.map(el => ({
                row1Ratio: 30, row2Ratio: 20, row3Ratio: 50, ...el
              }))
            })));

            alert('JSON 데이터를 성공적으로 불러왔습니다.');
          } catch (err) {
            console.error(err);
            alert('파일을 불러오는 중 오류가 발생했습니다. 올바른 JSON 파일인지 확인하세요.');
          }
        };
        reader.readAsText(file);
        e.target.value = null; 
      };

      const containerRef = useRef(null);
      const [isDragging, setIsDragging] = useState(false);
      const [isResizing, setIsResizing] = useState(false);
      const dragOffset = useRef({ x: 0, y: 0 });
      const resizeRef = useRef({ startW: 0, startH: 0, startX: 0, startY: 0 });
      const dragTargetIdRef = useRef(null);
      const pagesBeforeDrag = useRef(null);

      const onPointerDown = (e, elId) => {
        e.stopPropagation();
        pagesBeforeDrag.current = pages; // 드래그/리사이즈 시작 시점의 전체 상태 백업
        
        const page = pages.find(p => p.id === activePageId);
        const el = page?.elements.find(e => e.id === elId);
        
        if (!el || !containerRef.current) return;

        const rect = e.currentTarget.getBoundingClientRect();
        dragOffset.current = {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top
        };

        if (e.ctrlKey || e.metaKey) {
          const newId = generateId();
          const newEl = { 
            ...el, 
            id: newId, 
            x: el.x + 15, 
            y: el.y + 15 
          };
          
          pushHistory(pages); // 복사 전 상태 저장
          setPages(prev => prev.map(p => {
            if (p.id === activePageId) return { ...p, elements: [...p.elements, newEl] };
            return p;
          }));
          
          setSelectedElementId(newId);
          dragTargetIdRef.current = newId;
        } else {
          setSelectedElementId(elId);
          dragTargetIdRef.current = elId;
        }
        
        setIsDragging(true);
      };

      const onResizeDown = (e, el) => {
        e.stopPropagation();
        pagesBeforeDrag.current = pages; // 상태 백업
        setSelectedElementId(el.id);
        dragTargetIdRef.current = el.id;
        setIsResizing(true);
        resizeRef.current = {
          startW: el.w,
          startH: el.h,
          startX: e.clientX,
          startY: e.clientY
        };
      };

      const onPointerMove = useCallback((e) => {
        const targetId = dragTargetIdRef.current;
        if (!targetId || !containerRef.current) return;

        const targetEl = pages.find(p => p.id === activePageId)?.elements.find(el => el.id === targetId);

        if (isResizing && targetEl) {
          const dx = e.clientX - resizeRef.current.startX;
          const dy = e.clientY - resizeRef.current.startY;
          
          let newW = Math.max(1, resizeRef.current.startW + dx);
          let newH = Math.max(1, resizeRef.current.startH + dy);

          // 이동/크기 조절 중에는 무수히 렌더링되므로 History를 저장하지 않음(false 전달)
          updateElementDirectly(targetId, { w: newW, h: newH }, false);
          return;
        }

        if (isDragging) {
          const parentRect = containerRef.current.getBoundingClientRect();
          let newX = e.clientX - parentRect.left - dragOffset.current.x;
          let newY = e.clientY - parentRect.top - dragOffset.current.y;
          
          updateElementDirectly(targetId, { x: newX, y: newY }, false);
        }
      }, [isDragging, isResizing, activePageId, pages]);

      const onPointerUp = useCallback(() => {
        // 드래그 또는 리사이즈가 종료되는 시점에, 시작점과 비교하여 변경되었으면 과거(Past)에 삽입
        if ((isDragging || isResizing) && pagesBeforeDrag.current) {
          if (pagesBeforeDrag.current !== pages) {
            pushHistory(pagesBeforeDrag.current);
          }
        }
        setIsDragging(false);
        setIsResizing(false);
        pagesBeforeDrag.current = null;
      }, [isDragging, isResizing, pages, pushHistory]);

      useEffect(() => {
        if (isDragging || isResizing) {
          window.addEventListener('pointermove', onPointerMove);
          window.addEventListener('pointerup', onPointerUp);
        }
        return () => {
          window.removeEventListener('pointermove', onPointerMove);
          window.removeEventListener('pointerup', onPointerUp);
        };
      }, [isDragging, isResizing, onPointerMove, onPointerUp]);

      const activePage = pages.find(p => p.id === activePageId);
      const selectedElement = activePage?.elements.find(e => e.id === selectedElementId);

      const a4Width = orientation === 'portrait' ? '210mm' : '297mm';
      const a4Height = orientation === 'portrait' ? '297mm' : '210mm';

      return (
        <div className="flex h-screen bg-gray-100 font-sans overflow-hidden">
          
          {/* 인쇄용 CSS */}
          <style>{`
            @page { size: A4 ${orientation}; margin: 0; }
            @media print {
              body, html { background: white !important; margin: 0; padding: 0; }
              .no-print { display: none !important; }
              .print-area { display: block !important; width: 100% !important; padding: 0 !important; margin: 0 !important; overflow: visible !important; }
              .a4-page-container { 
                width: ${a4Width} !important; 
                min-height: ${a4Height} !important; 
                margin: 0 auto 10mm auto !important; 
                box-shadow: none !important; 
                border: none !important;
                page-break-after: always !important; 
              }
            }
          `}</style>

          {/* 왼쪽 사이드바 */}
          <div className="w-80 bg-white border-r border-gray-200 flex flex-col shadow-lg z-10 no-print flex-shrink-0">
            <div className="p-4 border-b border-gray-200 bg-blue-50">
              <h1 className="text-xl font-bold text-blue-900 mb-1 flex items-center">
                <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                종합 노출 분포도 맵핑
              </h1>
              <p className="text-xs text-blue-700">공정 내 다중 유해인자 시각화</p>
            </div>

            <div className="flex-1 overflow-y-auto">
              {/* 1. 데이터 연동 패널 */}
              <div className="p-4 border-b border-gray-200">
                <h2 className="text-sm font-bold text-gray-800 mb-3 flex items-center">
                  <span className="bg-blue-600 text-white w-5 h-5 rounded-full inline-flex justify-center items-center text-xs mr-2">1</span>
                  데이터 연동
                </h2>
                <div className="space-y-2 mb-3">
                  <input type="url" placeholder="소음측정 구글시트 URL" className="w-full text-xs p-2 border rounded" value={urls.noise} onChange={e => setUrls({...urls, noise: e.target.value})} />
                  <input type="url" placeholder="화학물질측정 구글시트 URL" className="w-full text-xs p-2 border rounded" value={urls.chem} onChange={e => setUrls({...urls, chem: e.target.value})} />
                </div>
                <button onClick={handleAnalyzeData} disabled={isLoading} className="w-full bg-gray-800 hover:bg-gray-900 text-white text-sm font-bold py-2 rounded transition flex justify-center items-center">
                  {isLoading ? '분석 중...' : '데이터 가져오기'}
                </button>
                {Object.keys(analyzedLocations).length > 0 && (
                  <p className="text-xs text-green-600 mt-2 text-center font-bold">분석 완료: {Object.keys(analyzedLocations).length}개 단위장소 확인</p>
                )}
              </div>

              {/* 2. 유해인자 필터 패널 & 범례 설정 */}
              <div className="p-4 border-b border-gray-200">
                <h2 className="text-sm font-bold text-gray-800 mb-3 flex items-center">
                  <span className="bg-blue-600 text-white w-5 h-5 rounded-full inline-flex justify-center items-center text-xs mr-2">2</span>
                  도면에 표시할 인자 선택
                </h2>
                <div className="grid grid-cols-2 gap-2 text-xs mb-4">
                  {AGENT_CATEGORIES.map(cat => (
                    <label key={cat} className="flex items-center space-x-2 cursor-pointer">
                      <input type="checkbox" checked={activeCategories[cat]} onChange={() => setActiveCategories({...activeCategories, [cat]: !activeCategories[cat]})} className="rounded text-blue-600 focus:ring-blue-500" />
                      <span className="text-gray-700 truncate">{String(cat)}</span>
                    </label>
                  ))}
                </div>
                
                {/* 하단 노출 수준 범례 토글 스위치 */}
                <div className="pt-3 border-t border-gray-200">
                  <label className="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" checked={showLegend} onChange={(e) => setShowLegend(e.target.checked)} className="rounded text-blue-600 focus:ring-blue-500" />
                    <span className="text-gray-800 font-bold text-xs">도면 하단 노출 수준 범례 표시</span>
                  </label>
                </div>
              </div>

              {/* 3. 그리기 도구 패널 */}
              <div className="p-4 border-b border-gray-200">
                <h2 className="text-sm font-bold text-gray-800 mb-3 flex items-center">
                  <span className="bg-blue-600 text-white w-5 h-5 rounded-full inline-flex justify-center items-center text-xs mr-2">3</span>
                  도면 요소 추가
                </h2>
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={() => addElement('rect')} className="p-2 border border-gray-300 rounded hover:bg-gray-50 flex flex-col items-center justify-center gap-1 transition">
                    <div className="w-6 h-6 border-[1.5px] border-gray-600 bg-white"></div>
                    <span className="text-xs font-semibold text-gray-700">공정 (3단표)</span>
                  </button>
                  <button onClick={() => addElement('circle')} className="p-2 border border-gray-300 rounded hover:bg-gray-50 flex flex-col items-center justify-center gap-1 transition">
                    <div className="w-6 h-6 border-[1.5px] border-gray-600 rounded-full bg-white"></div>
                    <span className="text-xs font-semibold text-gray-700">원형 포인트</span>
                  </button>
                  <button onClick={() => addElement('office')} className="p-2 border border-gray-300 rounded hover:bg-gray-50 flex flex-col items-center justify-center gap-1 transition">
                    <div className="w-full h-4 border-[1.5px] border-gray-400 bg-gray-100 mb-1"></div>
                    <span className="text-xs font-semibold text-gray-700">사무실 구역</span>
                  </button>
                  <button onClick={() => addElement('border-rect')} className="p-2 border border-gray-300 rounded hover:bg-gray-50 flex flex-col items-center justify-center gap-1 transition">
                    <div className="w-6 h-6 border-[1.5px] border-gray-600 bg-transparent"></div>
                    <span className="text-xs font-semibold text-gray-700">투명 공정 (3단표)</span>
                  </button>
                  <button onClick={() => addElement('company-name')} className="p-2 border border-blue-300 rounded hover:bg-blue-50 flex flex-col items-center justify-center gap-1 transition bg-blue-50/30">
                    <div className="w-12 h-5 flex items-center justify-center text-[0.45rem] font-semibold text-blue-600 tracking-tighter">&lt;0000&gt;</div>
                    <span className="text-xs font-semibold text-blue-700">사업체명 도형</span>
                  </button>
                  <button onClick={() => addElement('door')} className="p-2 border border-gray-300 rounded hover:bg-gray-50 flex flex-col items-center justify-center gap-1 transition">
                    <div className="w-6 h-1 bg-black"></div>
                    <span className="text-xs font-semibold text-gray-700">출입문/벽면</span>
                  </button>
                  <button onClick={() => addElement('text')} className="p-2 border border-gray-300 rounded hover:bg-gray-50 flex flex-col items-center justify-center gap-1 transition bg-gray-50">
                    <span className="font-serif font-semibold text-lg leading-none text-gray-700">T</span>
                    <span className="text-xs font-semibold text-gray-700">자유 텍스트</span>
                  </button>
                  <button onClick={() => addElement('text-red')} className="p-2 border border-red-300 rounded hover:bg-red-50 flex flex-col items-center justify-center gap-1 transition bg-red-50/30">
                    <span className="font-serif font-semibold text-lg leading-none text-red-600">T</span>
                    <span className="text-xs font-semibold text-red-600">빨간 텍스트(기호)</span>
                  </button>
                  <button onClick={() => addElement('line-h')} className="p-2 border border-gray-300 rounded hover:bg-gray-50 flex flex-col items-center justify-center gap-1 transition">
                    <div className="w-8 h-[1px] bg-black"></div>
                    <span className="text-xs font-semibold text-gray-700">가로선 (구분선)</span>
                  </button>
                  <button onClick={() => addElement('line-v')} className="p-2 border border-gray-300 rounded hover:bg-gray-50 flex flex-col items-center justify-center gap-1 transition">
                    <div className="w-[5px] h-6 bg-black"></div>
                    <span className="text-xs font-semibold text-gray-700">세로선 (구분선)</span>
                  </button>
                </div>
                <p className="text-[0.65rem] text-red-500 mt-2 font-bold text-center">💡 CTRL(CMD) 키를 누르고 드래그하면 복사됩니다.</p>
              </div>

              {/* 4. 배경 도면 삽입 패널 */}
              <div className="p-4 border-b border-gray-200">
                <h2 className="text-sm font-bold text-gray-800 mb-3 flex items-center">
                  <span className="bg-blue-600 text-white w-5 h-5 rounded-full inline-flex justify-center items-center text-xs mr-2">4</span>
                  배경 도면(평면도) 삽입
                </h2>
                <div className="flex flex-col gap-2">
                  <input 
                    type="file" 
                    accept="image/png, image/jpeg" 
                    id="bg-image-upload" 
                    className="hidden" 
                    onChange={(e) => {
                      const file = e.target.files[0];
                      if (!file) return;
                      const reader = new FileReader();
                      reader.onload = (event) => {
                        const base64 = event.target.result;
                        pushHistory(pages); // 업로드 전 히스토리 저장
                        setPages(prev => prev.map(p => p.id === activePageId ? { ...p, bgImage: base64 } : p));
                      };
                      reader.readAsDataURL(file);
                      e.target.value = null; 
                    }}
                  />
                  <button onClick={() => document.getElementById('bg-image-upload').click()} className="w-full bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 text-xs font-bold py-2 rounded transition flex justify-center items-center shadow-sm">
                    <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    이미지 원본 업로드
                  </button>
                  {pages.find(p => p.id === activePageId)?.bgImage && (
                    <button onClick={() => {
                      pushHistory(pages); // 삭제 전 히스토리 저장
                      setPages(prev => prev.map(p => p.id === activePageId ? { ...p, bgImage: null } : p));
                    }} className="w-full bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 text-xs font-bold py-1.5 rounded transition flex justify-center items-center mt-1">
                      배경 삭제
                    </button>
                  )}
                </div>
                <p className="text-[0.6rem] text-gray-500 mt-2 leading-tight">
                  ※ 업로드된 평면도 이미지가 <b>원본 화질 그대로</b> 캔버스 배경에 선명하게 적용됩니다.
                </p>
              </div>
            </div>
          </div>

          {/* 중앙 메인 영역 (캔버스) */}
          <div className="flex-1 flex flex-col bg-gray-300 overflow-hidden relative items-center">
            
            {/* 상단 툴바 */}
            <div className="w-full h-14 bg-white border-b border-gray-300 flex items-center justify-between px-4 shadow-sm z-10 no-print">
              <div className="flex items-center gap-2">
                <div className="flex bg-gray-100 p-1 rounded-lg items-center">
                  {/* ★ 페이지 리스트 및 개별 삭제 버튼 UI */}
                  {pages.map((p, idx) => (
                    <div key={p.id} className="relative flex items-center group">
                      <button 
                        onClick={() => { setActivePageId(p.id); setSelectedElementId(null); }}
                        className={`px-3 py-1 text-xs font-bold rounded-md transition ${activePageId === p.id ? 'bg-white shadow text-blue-700' : 'text-gray-600 hover:bg-gray-200'}`}
                      >
                        Page {idx + 1}
                      </button>
                      {/* 2개 이상의 페이지가 있을 때 현재 활성화된 페이지 우측에 삭제 버튼 표시 */}
                      {pages.length > 1 && activePageId === p.id && (
                        <button 
                          onClick={(e) => { e.stopPropagation(); deletePage(p.id); }}
                          className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-3.5 h-3.5 flex items-center justify-center text-[9px] hover:bg-red-600 shadow-sm"
                          title="이 페이지 삭제"
                        >
                          ✕
                        </button>
                      )}
                    </div>
                  ))}
                  <button onClick={addPage} className="px-2 py-1 text-xs font-bold text-gray-600 hover:bg-gray-200 rounded-md ml-1 flex items-center" title="페이지 추가">
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>
                  </button>
                </div>

                {/* ★ Undo / Redo 컨트롤 버튼 */}
                <div className="flex items-center gap-1 border-l pl-2 ml-2 border-gray-300">
                  <button onClick={undo} disabled={past.length === 0} className={`p-1.5 rounded transition ${past.length > 0 ? 'text-gray-700 hover:bg-gray-200' : 'text-gray-300'}`} title="실행 취소 (Ctrl+Z)">
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>
                  </button>
                  <button onClick={redo} disabled={future.length === 0} className={`p-1.5 rounded transition ${future.length > 0 ? 'text-gray-700 hover:bg-gray-200' : 'text-gray-300'}`} title="다시 실행 (Ctrl+Y)">
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 10h-10a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6"></path></svg>
                  </button>
                </div>
                
                <div className="flex items-center gap-1 border-l pl-2 border-gray-300">
                  <select 
                    value={orientation} 
                    onChange={(e) => setOrientation(e.target.value)} 
                    className="text-xs border border-gray-300 rounded px-1 py-1 outline-none bg-white"
                  >
                    <option value="portrait">A4 세로</option>
                    <option value="landscape">A4 가로</option>
                  </select>
                </div>
              </div>

              {/* 저장 / 불러오기 통합 메뉴 */}
              <div className="flex items-center gap-2">
                <input type="file" accept=".json" ref={fileInputRef} onChange={handleLoadJSON} className="hidden" />
                
                <button onClick={() => fileInputRef.current.click()} className="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1.5 rounded shadow font-bold text-xs flex items-center transition">
                  <svg className="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                  JSON 불러오기
                </button>
                <div className="h-6 w-px bg-gray-300 mx-1"></div>
                <button onClick={handleSaveJSON} className="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded shadow font-bold text-xs transition">
                  JSON 저장
                </button>
                <button onClick={handleSaveExcel} className="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded shadow font-bold text-xs transition">
                  Excel 저장
                </button>
                <button onClick={handleSaveJpeg} className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded shadow font-bold text-xs transition">
                  JPEG 저장
                </button>
                <button onClick={handlePrint} className="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded shadow font-bold text-xs transition">
                  PDF / 인쇄
                </button>
              </div>
            </div>

            {/* 도면 캔버스 영역 */}
            <div 
              className="flex-1 overflow-auto p-4 md:p-8 w-full print-area flex flex-col items-center" 
              onPointerDown={() => setSelectedElementId(null)} 
            >
              {pages.map((page, pageIndex) => (
                <div 
                  key={page.id}
                  id={`page-${page.id}`}
                  className={`a4-page-container bg-white shadow-2xl relative flex flex-col pt-10 pb-10 px-10 ${activePageId !== page.id && 'no-print hidden'}`}
                  style={{ width: a4Width, minHeight: a4Height, marginBottom: '20mm', display: activePageId === page.id ? 'flex' : 'none' }}
                >
                  {/* --- 헤더 --- */}
                  <div className="flex flex-col z-20 shrink-0 overflow-visible">
                    <div className="border-b-2 border-gray-800 pb-2 mb-4">
                      <h2 className="text-lg font-bold text-gray-900 tracking-tight pb-1">2. 작업환경측정 개요</h2>
                      <h3 className="text-lg font-bold text-gray-800 flex items-center flex-wrap w-full">
                        가. 단위 작업장소별 유해요인의 측정 위치도
                        <input
                          type="text"
                          value={manualTitle}
                          onChange={(e) => setManualTitle(e.target.value)}
                          placeholder="( 측정장소 직접 입력 )"
                          className="inline-block flex-1 ml-2 font-bold border-b border-transparent hover:border-gray-400 focus:outline-none focus:border-blue-500 bg-transparent transition-colors"
                          style={{ minWidth: '0' }}
                        />
                      </h3>
                    </div>
                  </div>

                  {/* --- 그리기 영역 --- */}
                  <div 
                    ref={activePageId === page.id ? containerRef : null}
                    className="flex-1 border-2 border-black bg-white relative w-full mb-4 overflow-hidden"
                  >
                    {page.bgImage && (
                      <img 
                        src={page.bgImage} 
                        className="absolute inset-0 w-full h-full object-contain pointer-events-none" 
                        alt="배경 평면도" 
                      />
                    )}

                    {page.elements.map(el => {
                      const isSelected = selectedElementId === el.id;
                      const isProcessNode = el.type === 'rect' || el.type === 'circle' || el.type === 'border-rect';
                      const isLinked = Boolean(isProcessNode && el.linkedLocation && analyzedLocations[el.linkedLocation]);
                      const isLine = el.type === 'line-h' || el.type === 'line-v';
                      
                      let bgColor = el.baseColor || 'transparent';
                      let borderColor = '#1f2937';
                      let borderStyle = 'solid';
                      let borderWidth = '1.5px'; 

                      if (isProcessNode) {
                        bgColor = '#ffffff';
                        if (el.type === 'border-rect') {
                          bgColor = 'transparent';
                          borderColor = '#000000';
                        }
                      } else if (el.type === 'door' || isLine) {
                        bgColor = '#000000'; 
                        borderStyle = 'none';
                        borderWidth = '0px';
                      } else if (el.type === 'text' || el.type === 'text-red' || el.type === 'company-name') {
                        bgColor = 'transparent'; 
                        borderStyle = 'none';
                        borderWidth = '0px';
                      }

                      const borderRadius = el.type === 'circle' ? '50%' : '0';

                      return (
                        <div
                          key={el.id}
                          onPointerDown={(e) => onPointerDown(e, el.id)}
                          className={`absolute flex select-none ${isSelected ? 'z-50' : 'z-10'}`}
                          style={{
                            left: `${el.x}px`,
                            top: `${el.y}px`,
                            width: `${el.w}px`,
                            height: `${el.h}px`,
                            cursor: isSelected ? 'move' : 'pointer',
                          }}
                        >
                          <div 
                            className={`w-full h-full flex overflow-hidden element-transition ${isSelected ? 'ring-2 ring-blue-500 shadow-lg' : ''} ${!isLinked ? 'items-center justify-center' : 'flex-col'}`}
                            style={{
                              backgroundColor: bgColor,
                              border: `${borderWidth} ${borderStyle} ${borderColor}`,
                              borderRadius: borderRadius,
                            }}
                          >
                            {/* 3단 표 레이아웃 */}
                          {isLinked ? (
                            <div className="w-full h-full flex flex-col items-stretch justify-between">
                              
                              <div 
                                className="w-full flex items-start justify-center text-center font-normal text-gray-900 border-b border-gray-400 px-1 shrink-0 overflow-hidden"
                                style={{ flex: `0 0 ${el.row1Ratio ?? 30}%`, fontSize: `${el.fontSize || 14}px`, wordBreak: 'keep-all', backgroundColor: el.type === 'border-rect' ? 'transparent' : '#ffffff' }}
                              >
                                <span className="block w-full pt-[1px] pb-[8px] leading-[1.1]">{String(el.text)}</span>
                              </div>
                              
                              <div 
                                className="w-full flex items-start justify-center text-center font-normal text-[#ff0000] border-b border-gray-300 px-1 shrink-0 overflow-hidden"
                                style={{ flex: `0 0 ${el.row2Ratio ?? 20}%`, fontSize: `${Math.max(8, (el.fontSize || 14) * 0.75)}px`, wordBreak: 'break-all', backgroundColor: el.type === 'border-rect' ? 'transparent' : '#ffffff' }}
                              >
                                <span className="block w-full pt-[1px] pb-[8px] leading-[1.1]">
                                {el.symbolText 
                                  ? String(el.symbolText) 
                                  : (analyzedLocations[el.linkedLocation]?.pointSummary 
                                      ? String(analyzedLocations[el.linkedLocation].pointSummary) 
                                      : '\u00A0')}
                                </span>
                              </div>
                              
                              <div 
                                className="w-full flex flex-col items-stretch justify-start overflow-hidden"
                                style={{ flex: `1 1 ${el.row3Ratio ?? 50}%` }}
                              >
                                {Object.entries(analyzedLocations[el.linkedLocation].categories).map(([cat, data]) => {
                                    const style = getExposureStyleAndText(cat, data);
                                    return (
                                      <div 
                                        key={cat}
                                        title={String(style.displayText)}
                                        className={`flex-1 w-full flex items-start justify-center px-1 font-normal border-t border-white/20 ${String(style.text)} overflow-hidden`} 
                                        style={{ 
                                          backgroundColor: String(style.bg),
                                          fontSize: `${Math.max(8, (el.fontSize || 14) * 0.65)}px`,
                                          minHeight: '14px'
                                        }}
                                      >
                                        <span className="block w-full pt-[1px] pb-[8px] leading-[1.1] truncate text-center">{String(cat)}</span>
                                      </div>
                                    );
                                  })}
                                </div>

                              </div>
                            ) : (
                              !isLine && (
                                <span 
                                  className="text-center font-normal px-1 whitespace-pre-wrap block w-full pt-[1px] pb-[8px] leading-[1.1]"
                                  style={{ 
                                    fontSize: `${el.fontSize || 14}px`, 
                                    color: el.type === 'door' ? 'transparent' : 
                                           el.type === 'text-red' ? '#ff0000' : 
                                           el.type === 'company-name' ? '#2563eb' : '#111827',
                                    wordBreak: 'keep-all' 
                                  }}
                                >
                                  {String(el.text)}
                                </span>
                              )
                            )}
                          </div>

                          {isSelected && (
                            <div 
                              onPointerDown={(e) => onResizeDown(e, el)}
                              className="absolute right-0 bottom-0 w-3 h-3 bg-blue-600 border border-white rounded-full cursor-se-resize transform translate-x-1/2 translate-y-1/2 shadow-md hover:scale-125 transition-transform no-print z-50"
                            ></div>
                          )}
                        </div>
                      );
                    })}
                  </div>

                  {/* --- 푸터 (범례 조건부 렌더링) --- */}
                  <div className="flex flex-col justify-end z-20 shrink-0 mt-2 overflow-visible">
                    <div className="text-gray-900 font-semibold flex flex-col gap-1.5 w-full" style={{ fontSize: '0.75rem' }}>
                      <p className="whitespace-normal break-keep">※ 측정대상 부서의 평면도를 그리고 단위작업장소별 측정위치를 표시한다.</p>
                      <p className="whitespace-normal break-keep">※ 측정점 용어설명 - N(Noise) : 소음, P(Particulates:Dust,Mist,Fume etc) : 분진류, S(Solvents) : 유기화합물, M(Metals) : 금속류, G(Gas) : 가스류, A(Acids) : 산·알카리류</p>
                      
                      {showLegend && (
                        <div className="flex flex-nowrap justify-start items-center w-full pt-1 gap-x-3 overflow-visible whitespace-nowrap" style={{ fontSize: '0.62rem', letterSpacing: '-0.02em' }}>
                          <span className="shrink-0 font-extrabold pr-1">※ 노출 수준 범례 -</span>
                          <span className="flex items-center"><span className="w-3 h-3 bg-[#22c55e] inline-block mr-1 border border-black/20"></span>10% 미만</span>
                          <span className="flex items-center"><span className="w-3 h-3 bg-[#eab308] inline-block mr-1 border border-black/20"></span>10~50% 미만(소음 80이상, 고열 23℃이상)</span>
                          <span className="flex items-center"><span className="w-3 h-3 bg-[#f97316] inline-block mr-1 border border-black/20"></span>50~100% 이하(소음 85이상, 고열 25℃이상)</span>
                          <span className="flex items-center"><span className="w-3 h-3 bg-[#ef4444] inline-block mr-1 border border-black/20"></span>노출기준 초과</span>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* 오른쪽 사이드바 (속성 패널) */}
          <div className="w-72 bg-white border-l border-gray-200 flex flex-col shadow-lg z-10 no-print flex-shrink-0">
            <div className="p-4 border-b border-gray-200 bg-gray-50">
              <h2 className="text-base font-bold text-gray-800">도형 속성 설정</h2>
            </div>

            {selectedElement ? (
              <div className="p-5 space-y-5 overflow-y-auto">
                {/* 위치 및 크기 */}
                <div>
                  <h3 className="text-xs font-bold text-gray-500 uppercase mb-2">위치 및 크기</h3>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-[0.7rem] text-gray-600 mb-1">X 좌표</label>
                      <input type="number" value={selectedElement.x} onChange={e => updateSelectedElement({ x: parseInt(e.target.value) || 0 })} className="w-full text-sm p-1.5 border rounded" />
                    </div>
                    <div>
                      <label className="block text-[0.7rem] text-gray-600 mb-1">Y 좌표</label>
                      <input type="number" value={selectedElement.y} onChange={e => updateSelectedElement({ y: parseInt(e.target.value) || 0 })} className="w-full text-sm p-1.5 border rounded" />
                    </div>
                    <div>
                      <label className="block text-[0.7rem] text-gray-600 mb-1">너비 (W)</label>
                      <input type="number" value={selectedElement.w} onChange={e => updateSelectedElement({ w: parseInt(e.target.value) || 10 })} className="w-full text-sm p-1.5 border rounded" />
                    </div>
                    <div>
                      <label className="block text-[0.7rem] text-gray-600 mb-1">높이 (H)</label>
                      <input type="number" value={selectedElement.h} onChange={e => updateSelectedElement({ h: parseInt(e.target.value) || 10 })} className="w-full text-sm p-1.5 border rounded" />
                    </div>
                  </div>
                </div>

                {/* 텍스트 설정 */}
                {(selectedElement.type !== 'line-h' && selectedElement.type !== 'line-v') && (
                  <div className="border-t border-gray-200 pt-4">
                    <h3 className="text-xs font-bold text-gray-500 uppercase mb-2">
                      표시 텍스트 
                      {selectedElement.type === 'text-red' && <span className="text-red-500"> (기호)</span>}
                      {selectedElement.type === 'company-name' && <span className="text-blue-500"> (사업체명)</span>}
                    </h3>
                    <textarea 
                      value={selectedElement.text} 
                      onChange={e => {
                        let val = e.target.value;
                        if (selectedElement.type === 'text-red') {
                          const inputType = e.nativeEvent?.inputType;
                          const data = e.nativeEvent?.data;
                          
                          if (inputType !== 'deleteContentBackward' && inputType !== 'deleteContentForward') {
                            if (val.length === 1 && val !== '*') {
                                val = '*' + val;
                            }
                            if (data === ',') {
                              const cursor = e.target.selectionStart;
                              if (cursor > 0 && val[cursor - 1] === ',') {
                                val = val.slice(0, cursor) + ' *' + val.slice(cursor);
                              }
                            }
                          }
                        }
                        updateSelectedElement({ text: val }); // 프로퍼티 패널 수정 시에도 Undo 기록 반영됨
                      }}
                      className={`w-full text-sm p-2 border rounded resize-none focus:ring-1 focus:ring-blue-500 ${selectedElement.type === 'text-red' ? 'text-red-600 font-semibold bg-red-50' : selectedElement.type === 'company-name' ? 'text-blue-600 font-semibold bg-blue-50' : ''}`}
                      rows="2"
                    />
                    
                    {selectedElement.type === 'text-red' && (
                      <p className="text-[0.6rem] text-red-500 mt-1 leading-tight">※ 쉼표(,)를 입력하면 자동으로 '*' 기호가 붙습니다.</p>
                    )}
                    
                    {(selectedElement.type === 'rect' || selectedElement.type === 'circle' || selectedElement.type === 'border-rect') && (
                      <div className="mt-3">
                        <label className="block text-[0.7rem] text-gray-600 mb-1 font-bold text-red-600">측정기호 (2째줄 빨간글씨 수정)</label>
                        <input 
                          type="text" 
                          value={selectedElement.symbolText || ''} 
                          onChange={e => {
                            let val = e.target.value;
                            const inputType = e.nativeEvent.inputType;
                            const data = e.nativeEvent.data;
                            
                            if (inputType !== 'deleteContentBackward' && inputType !== 'deleteContentForward') {
                              if (val.length === 1 && val !== '*') {
                                  val = '*' + val;
                              }
                              if (data === ',') {
                                const cursor = e.target.selectionStart;
                                if (cursor > 0 && val[cursor - 1] === ',') {
                                  val = val.slice(0, cursor) + ' *' + val.slice(cursor);
                                }
                              }
                            }

                            updateSelectedElement({ symbolText: val });
                          }}
                          placeholder={selectedElement.linkedLocation && analyzedLocations[selectedElement.linkedLocation]?.pointSummary ? String(analyzedLocations[selectedElement.linkedLocation].pointSummary) : "자동 추출값이 표시됨"}
                          className="w-full text-sm p-2 border border-red-300 rounded focus:ring-1 focus:ring-red-500 bg-red-50/30"
                        />
                        <p className="text-[0.6rem] text-gray-500 mt-1 leading-tight">※ 쉼표(,)를 입력하면 1회에 한해 자동으로 '*'가 붙습니다. 지우기(DEL)도 자유롭게 가능합니다.</p>
                      </div>
                    )}

                    <div className="mt-3">
                      <label className="block text-[0.7rem] text-gray-600 mb-1">글자 크기</label>
                      <input type="range" min="8" max="48" value={selectedElement.fontSize || 14} onChange={e => updateSelectedElement({ fontSize: parseInt(e.target.value) })} className="w-full" />
                    </div>
                  </div>
                )}

                {/* 3단 표 비율 수동 조절 */}
                {(selectedElement.type === 'rect' || selectedElement.type === 'circle' || selectedElement.type === 'border-rect') && (
                  <div className="border-t border-gray-200 pt-4">
                    <h3 className="text-xs font-bold text-gray-500 uppercase mb-2">3단 표 내부 비율 조절 (%)</h3>
                    <div className="flex gap-2">
                      <div className="flex-1">
                        <label className="block text-[0.65rem] text-gray-600 mb-1 text-center">1단(공정명)</label>
                        <input type="number" value={selectedElement.row1Ratio ?? 30} onChange={e => updateSelectedElement({ row1Ratio: parseInt(e.target.value) || 0 })} className="w-full text-sm p-1.5 border rounded text-center focus:ring-1 focus:ring-blue-500" />
                      </div>
                      <div className="flex-1">
                        <label className="block text-[0.65rem] text-gray-600 mb-1 text-center">2단(측정기호)</label>
                        <input type="number" value={selectedElement.row2Ratio ?? 20} onChange={e => updateSelectedElement({ row2Ratio: parseInt(e.target.value) || 0 })} className="w-full text-sm p-1.5 border rounded text-center focus:ring-1 focus:ring-blue-500" />
                      </div>
                      <div className="flex-1">
                        <label className="block text-[0.65rem] text-gray-600 mb-1 text-center">3단(노출수준)</label>
                        <input type="number" value={selectedElement.row3Ratio ?? 50} onChange={e => updateSelectedElement({ row3Ratio: parseInt(e.target.value) || 0 })} className="w-full text-sm p-1.5 border rounded text-center focus:ring-1 focus:ring-blue-500" />
                      </div>
                    </div>
                  </div>
                )}

                {/* 데이터 연동 */}
                {(selectedElement.type === 'rect' || selectedElement.type === 'circle' || selectedElement.type === 'border-rect') && (
                  <div className="border-t border-gray-200 pt-4 bg-blue-50/50 -mx-5 px-5 pb-4">
                    <h3 className="text-xs font-bold text-blue-800 uppercase mb-2 flex items-center">
                      <svg className="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                      데이터(단위장소) 연결
                    </h3>
                    <p className="text-[0.65rem] text-gray-500 mb-2 leading-tight">선택 시 도면에 <b>[1.공정명] [2.H열 원본데이터] [3.유해인자 뱃지]</b> 3줄이 꽉 차게 생성됩니다.</p>
                    <select 
                      value={selectedElement.linkedLocation || ''} 
                      onChange={e => {
                        const val = e.target.value;
                        updateSelectedElement({ linkedLocation: val, text: val || '공정명' });
                      }}
                      className="w-full text-sm p-2 border border-blue-200 rounded focus:ring-1 focus:ring-blue-500 outline-none shadow-sm"
                    >
                      <option value="">-- 단위장소 선택 안함 (회색) --</option>
                      {Object.keys(analyzedLocations).sort().map(loc => {
                        const catCount = Object.keys(analyzedLocations[loc].categories || {}).length;
                        return (
                          <option key={loc} value={loc}>
                            {loc} (총 {catCount}개 인자군)
                          </option>
                        )
                      })}
                    </select>

                    {selectedElement.linkedLocation && analyzedLocations[selectedElement.linkedLocation] && (
                      <div className="mt-3 p-3 bg-white rounded border border-gray-200 shadow-sm">
                        <div className="text-xs font-bold text-gray-700 mb-2 border-b pb-1">해당 장소 유해인자 상세 (최대치)</div>
                        <div className="text-[0.7rem] text-gray-600 space-y-2 mt-1 max-h-40 overflow-y-auto">
                          {Object.entries(analyzedLocations[selectedElement.linkedLocation].categories).map(([cat, data], idx) => {
                            const style = getExposureStyleAndText(cat, data);
                            return (
                              <div key={idx} className="border-l-2 pl-2" style={{ borderColor: style.bg }}>
                                <div className="font-bold text-gray-800 flex justify-between">
                                  <span>{String(cat)}</span>
                                  <span className={style.bg === '#ef4444' ? 'text-red-600' : 'text-gray-800'}>
                                    {String(style.displayText)}
                                  </span>
                                </div>
                                <ul className="mt-0.5 space-y-0.5">
                                  {data.agents.map((a, i) => (
                                    <li key={i} className="flex justify-between text-[0.65rem] text-gray-500">
                                      <span className="truncate w-3/4" title={a.name}>- {String(a.name)}</span>
                                      <span className={a.ratio > 100 || (cat === '소음' && a.value > (a.limit !== 9999 ? a.limit : 90)) ? 'text-red-500 font-bold' : ''}>
                                        {cat === '소음' || cat === '고열' ? `${a.value} ${cat === '소음' ? 'dB' : '℃'}` : `${a.ratio.toFixed(1)}%`}
                                      </span>
                                    </li>
                                  ))}
                                </ul>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* 요소 삭제 버튼 */}
                <div className="pt-6">
                  <button onClick={deleteSelectedElement} className="w-full py-2 bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 rounded text-sm font-bold transition flex items-center justify-center">
                    <svg className="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    도형 삭제 (DEL)
                  </button>
                </div>
              </div>
            ) : (
              <div className="flex-1 flex flex-col items-center justify-center p-6 text-center text-gray-400">
                <svg className="w-12 h-12 mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                <p className="text-sm font-medium">캔버스에서 속성을 편집할<br/>도형을 클릭해주세요.</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
